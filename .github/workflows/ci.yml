name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # Use a uv-managed venv (not --system: the runner's /usr python is
      # externally managed / PEP 668). Dev extras pull [search]
      # (sentence-transformers), [mcp], [sign] — the suite needs them (see the
      # pyproject dev note). [lora]/[robotics] stay opt-in; those tests are
      # importorskip-gated.
      # setup-uv (with python-version) already provisions a .venv; install into it.
      - name: Install
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        # Smoke/calibration tests need a live LLM / `claude` binary and are gated by
        # env vars (DAISUGI_SMOKE / ANTHROPIC_API_KEY); they stay skipped in CI.
        run: uv run pytest -q

      - name: Adversarial merge gate (roadmap Stage 3)
        # The deterministic gate corpus is exactly reproducible, so any attack
        # it fails to deny is a bug — this is the merge gate, run explicitly so
        # its role is legible in CI output rather than buried in the full suite.
        # Prints the published attack-denial / false-positive rates too.
        run: |
          uv run pytest -q tests/test_adversarial.py
          uv run daisugi gate audit
